# ============================================================
# Railway — Servicio Backend (Hono + Bun)
# ============================================================
[build]
builder      = "NIXPACKS"
buildCommand = "bun install --frozen-lockfile"

[deploy]
startCommand = "bun src/index.ts"

# Railway inyecta $PORT automáticamente; Hono lo lee en src/index.ts
# Railway inyecta $DATABASE_URL desde el plugin de PostgreSQL

# Health check: Railway reinicia el contenedor si /health falla
healthcheckPath    = "/health"
healthcheckTimeout = 300          # segundos de espera por respuesta

# Política de reinicio ante fallos inesperados
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Variables de entorno de producción ─────────────────────
# (DATABASE_URL se inyecta automáticamente por el plugin PostgreSQL)
# Agrega el resto en el dashboard de Railway → Variables:
#
#   NODE_ENV     = production
#   FRONTEND_URL = https://tu-frontend.railway.app
