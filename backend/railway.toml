# ============================================================
# Railway — Servicio Backend (Hono + Bun)
# Usa Dockerfile en vez de Nixpacks para garantizar Bun nativo
# ============================================================
[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# El CMD del Dockerfile arranca el servidor
healthcheckPath    = "/health"
healthcheckTimeout = 300

restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Variables a agregar en el dashboard de Railway:
#   NODE_ENV     = production
#   FRONTEND_URL = https://tu-frontend.railway.app
# DATABASE_URL se inyecta automáticamente desde el plugin PostgreSQL
