<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Columnas del kanban (3 columnas simplificadas) -->
  <!-- Columna izquierda -->
  <rect x="72"  y="140" width="100" height="16" rx="8" fill="#334155"/>
  <rect x="72"  y="168" width="100" height="64" rx="10" fill="#1e3a5f" opacity="0.8"/>
  <rect x="72"  y="244" width="100" height="64" rx="10" fill="#1e3a5f" opacity="0.6"/>
  <rect x="72"  y="320" width="100" height="44" rx="10" fill="#1e3a5f" opacity="0.4"/>

  <!-- Columna central (destacada) -->
  <rect x="206" y="140" width="100" height="16" rx="8" fill="url(#accent)"/>
  <rect x="206" y="168" width="100" height="64" rx="10" fill="#1e40af" opacity="0.9"/>
  <rect x="206" y="244" width="100" height="44" rx="10" fill="#1e40af" opacity="0.7"/>
  <rect x="206" y="300" width="100" height="64" rx="10" fill="#1e40af" opacity="0.5"/>

  <!-- Columna derecha -->
  <rect x="340" y="140" width="100" height="16" rx="8" fill="#334155"/>
  <rect x="340" y="168" width="100" height="44" rx="10" fill="#1e3a5f" opacity="0.8"/>
  <rect x="340" y="224" width="100" height="64" rx="10" fill="#1e3a5f" opacity="0.6"/>

  <!-- Líneas de texto simuladas en las tarjetas -->
  <rect x="84"  y="180" width="76" height="6"  rx="3" fill="#475569" opacity="0.7"/>
  <rect x="84"  y="194" width="52" height="6"  rx="3" fill="#475569" opacity="0.4"/>
  <rect x="84"  y="256" width="76" height="6"  rx="3" fill="#475569" opacity="0.7"/>
  <rect x="84"  y="270" width="44" height="6"  rx="3" fill="#475569" opacity="0.4"/>

  <rect x="218" y="180" width="76" height="6"  rx="3" fill="#93c5fd" opacity="0.8"/>
  <rect x="218" y="194" width="52" height="6"  rx="3" fill="#93c5fd" opacity="0.4"/>
  <rect x="218" y="256" width="76" height="6"  rx="3" fill="#93c5fd" opacity="0.7"/>

  <rect x="352" y="180" width="76" height="6"  rx="3" fill="#475569" opacity="0.7"/>
  <rect x="352" y="236" width="76" height="6"  rx="3" fill="#475569" opacity="0.7"/>
  <rect x="352" y="250" width="52" height="6"  rx="3" fill="#475569" opacity="0.4"/>

  <!-- Badge "×N" en tarjeta central -->
  <rect x="272" y="172" width="28" height="18" rx="6" fill="#3b82f6"/>
  <text x="286" y="185" text-anchor="middle" font-family="monospace" font-size="11"
        font-weight="bold" fill="white">×3</text>
</svg>
